{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Verificar MFA</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="container text-center">
        <h2>Verificación MFA</h2>
        <p>Ingresa el código enviado a tu correo</p>

        <form id="mfaForm" class="mt-3">
            {% csrf_token %}
            <input type="text" id="mfaCode" class="form-control mb-3 text-center" placeholder="123456" maxlength="6"
                required>

            <button class="btn btn-primary" id="mfa-btn">Verificar</button>
        </form>
    </div>

    <div id="dlgMFA" class="dlgOverlay">
        <div class="alert-warning-custom d-flex flex-column gap-1">
            <p id="dlgMFAData"></p>
            <button id="goMFA" class="btn btn-danger btn-sm">Entendido</button>
        </div>
    </div>

    <script src="{% static 'js/alertAnimations.js' %}"></script>
    <script src="{% static 'js/verify_mfa.js' %}"></script>
    <script src="{% static 'js/get_cookie.js' %}"></script>
</body>

</html>
