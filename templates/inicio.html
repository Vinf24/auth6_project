{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-8 col-md-6 col-lg-4">

                <div class="card shadow-lg p-4 text-center rounded-4">

                    <h2 class="mb-3">Bienvenido</h2>
                    <p class="text-muted mb-4">Gestiona tu seguridad y sesión</p>

                    <div class="d-grid gap-3">

                        <button id="toggleMFA" class="btn btn-outline-primary">
                            Activar / Desactivar MFA
                        </button>

                        <button id="logoutBtn" class="btn btn-danger">
                            Cerrar sesión
                        </button>

                    </div>

                </div>

            </div>
        </div>
    </div>

    <div id="dlgMFAStatus" class="dlgOverlay">
        <div class="alert-info-custom d-flex flex-column gap-2 text-center">
            <p id="dlgMFAStatusData" class="mb-1"></p>
            <button id="goMFAStatus" class="btn btn-outline-light btn-sm">
                Entendido
            </button>
        </div>
    </div>

    <script src="{% static 'js/toggle_mfa.js' %}"></script>
    <script src="{% static 'js/logout.js' %}"></script>
    <script src="{% static 'js/get_cookie.js' %}"></script>
    <script src="{% static 'js/alertAnimations.js' %}"></script>

</body>

</html>
