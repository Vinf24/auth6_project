{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'img/icon-Alke-16.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'img/icon-Alke-32.png' %}">
    <link rel="icon" type="image/png" sizes="48x48" href="{% static 'img/icon-Alke-48.png' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="overflow-y-scroll">
    <div id="dlgLogin" class="dlgOverlay">
        <div class="alert-warning-custom d-flex flex-column gap-1" role="alert">
            <p class="alert-content" id="dlgLoginData"></p>
            <div class="d-flex justify-content-center gap-2">
                <button id="goLogin" class="btn btn-danger btn-sm">Entendido</button>
            </div>
        </div>
    </div>
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-10 col-md-9">
                <div class="main-title pb-4 text-center">Iniciar Sesión</div>
                <div class="fs-5 text-center">Ingresa credenciales:</div>
                <form id="loginForm" class="form-group mb-4 mt-2 p-2 tarjeta" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label mb-1" for="emailLogin">Email:</label>
                        <input class="form-control cont-data" type="email" id="emailLogin" placeholder="correo@dom"
                            required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label mb-1" for="claveLogin">Password:</label>
                        <input class="form-control cont-data" type="password" id="claveLogin" placeholder="contraseña"
                            required>
                    </div>
                    <div class="text-center">
                        <label>
                            <input type="checkbox" id="chkRemember">
                            Recordarme
                        </label>
                    </div>
                    <button class="btn btn-primary" type="submit" id="btnLogin" href=""
                        data-title="Iniciando Sesión">Login</button>
                </form>
            </div>
            <hr class="linea">
            <p class="text-center my-1 opacity-75">¿no tienes una cuenta?</p>
            <hr class="linea">
            <div class="container text-center">
                <button class="btn btn-outline-primary my-2 mx-auto" data-bs-toggle="modal"
                    data-bs-target="#registroModal">
                    Registrarse
                </button>
            </div>
        </div>
    </div>
    <div class="modal fade" id="registroModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-light">
                    <h4 id="formTitle" class="modal-title">Crear Usuario</h4>
                    <button id="closeForm" type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="registerForm" novalidate>
                        <div class="row">
                            <div class="mb-3 w-50">
                                <label for="nombre" class="form-label">Nombre:</label>
                                <input type="text" id="nombre" class="form-control pe-0 cont-data"
                                    placeholder="nombre..." required>
                            </div>
                            <div class="mb-3 w-50">
                                <label for="apellido" class="form-label">Apellido:</label>
                                <input type="text" id="apellido" class="form-control pe-0 cont-data"
                                    placeholder="apellido..." required>
                            </div>
                        </div>
                        <div class="mb-3 w-75">
                            <label for="regEmail" class="form-label">Correo Electrónico:</label>
                            <input type="email" id="regEmail" class="form-control cont-data"
                                placeholder="correo electrónico..." required>
                        </div>
                        <div class="mb-3 w-75">
                            <label for="regClave" class="form-label">Contraseña:</label>
                            <input type="password" id="regClave" class="form-control cont-data" placeholder="contraseña"
                                required>
                        </div>
                        <div class="mb-3 w-75">
                            <label for="regClaveRepeat" class="form-label">Confirme su Contraseña:</label>
                            <input type="password" id="regClaveRepeat" class="form-control cont-data"
                                placeholder="repetir contraseña" required>
                        </div>
                        <button class="btn btn-primary" type="submit" id="register">Registrarse</button>
                    </form>
                    <div id="dlgRegister" class="dlgOverlay">
                        <div class="alert-warning-custom d-flex flex-column gap-1" role="alert">
                            <p class="alert-content" id="dlgRegisterData"></p>
                            <div class="d-flex justify-content-center gap-2">
                                <button id="goRegister" class="btn btn-danger btn-sm">Entendido</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="cancelForm" class="btn btn-dark" data-bs-dismiss="modal">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="{% static 'js/alertAnimations.js' %}"></script>
    <script src="{% static 'js/script.js' %}"></script>
    <script src="{% static 'js/register.js' %}"></script>
    <script src="{% static 'js/login.js' %}"></script>
    <script src="{% static 'js/get_cookie.js' %}"></script>
</body>

</html>
